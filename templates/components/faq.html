<section class="section-padding">
  <div class="section-container">

    <h2 class="text-2xl md:text-4xl font-bold mb-12 text-center">
      Frequently Asked <span class="text-sky-600">Questions</span>
    </h2>

    <div class="max-w-2xl mx-auto space-y-3">
      {% for faq in faqs %}
      <details class="border border-border rounded-xl overflow-hidden group">
        <summary class="px-6 py-5 font-display font-semibold text-foreground cursor-pointer list-none flex items-center justify-between hover:bg-muted/50 transition-colors">
          {{ faq.q }}
          <svg xmlns="http://www.w3.org/2000/svg"
               class="w-5 h-5 text-muted-foreground transition-transform duration-300 group-open:rotate-180"
               viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m6 9 6 6 6-6"/>
          </svg>
        </summary>
        <div class="px-6 pb-5 text-muted-foreground leading-relaxed">
          {{ faq.a }}
        </div>
      </details>
      {% endfor %}
    </div>

  </div>
</section>
