{% load static %}
<section class="relative min-h-screen flex items-center">

  <!-- Background image -->
  <div class="absolute inset-0 z-0">
    <img src="{% static 'images/assets/hero-interior.jpg' %}"
         alt="Modern interior design"
         class="w-full h-full object-cover" />
    <div class="absolute inset-0 bg-linear-to-r from-neutral-900/90 via-neutral-900/70 to-neutral-900/30"></div>
  </div>

  <!-- Logo — mobile only -->
  <div class="md:hidden absolute top-4 left-1/2 -translate-x-1/2 z-20">
    <img src="{% static 'images/assets/logo.png' %}"
         alt="VIDeR Interiors"
         class="h-14 w-auto" />
  </div>

  <!-- Content -->
  <div class="relative z-10 max-w-5xl mx-auto px-6 md:px-8 w-full py-20 md:py-32">
    <div class="max-w-2xl">

      <h1 class="text-3xl md:text-5xl lg:text-[3.4rem] leading-tight font-bold mb-6 text-white">
        Got Flat/Villa Possession in Bangalore? Plan Your Interiors Before You Move In.
      </h1>

      <p class="text-base md:text-lg text-white/80 mb-8 leading-relaxed max-w-xl">
        We help homeowners finalize layouts, storage, civil planning and
        materials before execution begins — so there are no mid-project surprises.
      </p>

      <a href="#consultation-form"
         class="inline-block bg-primary text-primary-foreground px-8 py-4 rounded-lg text-lg font-display font-semibold hover:opacity-90 transition-opacity">
        Book Free Interior Planning call
      </a>

      <div class="mt-8 flex items-center gap-2 text-white/60 text-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        <span>| Serving Bangalore |</span>
      </div>

    </div>
  </div>

</section>
