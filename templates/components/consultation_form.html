\{% load static %}

{% if messages %}
  <section id="consultation-form" class="section-padding bg-foreground">
    <div class="section-container">
      <div class="max-w-md mx-auto text-center">

        <!-- Success icon -->
        <div class="w-16 h-16 rounded-full bg-success/20 flex items-center justify-center mx-auto mb-6">
          <svg class="w-8 h-8 text-success" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
          </svg>
        </div>

        {% for message in messages %}
        <h3 class="text-2xl font-bold text-white mb-3">Thank You!</h3>
        <p class="text-white/70">{{ message }}</p>
        {% endfor %}

      </div>
    </div>
  </section>

{% else %}

  <section id="consultation-form" class="section-padding bg-foreground">
    <div class="section-container">
      <div class="max-w-lg mx-auto">

        <h2 class="text-2xl md:text-4xl font-bold text-white mb-3 text-center">
          If Your Possession Is Near,
          <span class="text-primary">Start Planning Now.</span>
        </h2>

        <form method="POST" action="{% url 'submit_lead' %}" class="space-y-4 mt-10">
          {% csrf_token %}

          <input required type="text" name="name" placeholder="Your Name"
                 class="w-full px-4 py-3 rounded-lg border border-input bg-background text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary transition-shadow" />

          <div class="flex items-center rounded-lg border border-input bg-background overflow-hidden focus-within:ring-2 focus-within:ring-primary transition-shadow">
            <select name="country_code"
                    class="px-3 py-3 bg-transparent text-foreground text-sm focus:outline-none cursor-pointer">
              <option value="+91">+91</option>
              <option value="+1">+1</option>
              <option value="+44">+44</option>
              <option value="+971">+971</option>
              <option value="+65">+65</option>
              <option value="+61">+61</option>
            </select>
            <div class="w-px h-6 bg-input shrink-0"></div>
            <input required type="tel" name="phone" placeholder="Phone Number"
                   class="flex-1 px-3 py-3 bg-transparent text-foreground placeholder:text-muted-foreground focus:outline-none" />
          </div>

          <select required name="bhk"
                  class="w-full px-4 py-3 rounded-lg border border-input bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-primary transition-shadow appearance-none">
            <option value="" disabled selected>BHK Type</option>
            <option value="2BHK">2BHK</option>
            <option value="3BHK">3BHK</option>
            <option value="3BHK">4BHK</option>
            <option value="3BHK">4+BHK</option>
          </select>

          <select required name="timeline"
                  class="w-full px-4 py-3 rounded-lg border border-input bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-primary transition-shadow appearance-none">
            <option value="" disabled selected>Possession Timeline</option>
            <option value="immediate">Immediate</option>
            <option value="1-3 Months">1–3 Months</option>
            <option value="3+">3+ Months</option>
          </select>

          <select required name="budget"
                  class="w-full px-4 py-3 rounded-lg border border-input bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-primary transition-shadow appearance-none">
            <option value="" disabled selected>Budget Range</option>
            <option value="8L-12L">₹8L – ₹12L</option>
            <option value="12L-20L">₹12L – ₹20L</option>
            <option value="20L-25L">₹20L – ₹30L</option>
            <option value="30L+">₹30L+</option>
          </select>

          <button type="submit"
                  class="w-full bg-primary text-primary-foreground py-4 rounded-lg text-lg font-display font-semibold hover:opacity-90 transition-opacity mt-2">
            Schedule My Planning Call
          </button>

        </form>
      </div>
    </div>
  </section>

{% endif %}
