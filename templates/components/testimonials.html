<section class="py-16 sm:py-24 bg-card">
  <div class="section-container">

    <div class="text-center max-w-3xl mx-auto mb-10 sm:mb-12">
      <span class="text-sm font-medium uppercase tracking-wider text-primary">
        Client Reviews
      </span>
      <h2 class="text-3xl sm:text-4xl font-bold mt-4 mb-4 text-sky-900">
        What Our <span class="text-primary">Clients Say</span>
      </h2>
      <p class="text-base sm:text-lg text-muted-foreground">
        Don't just take our word for it. Hear from our satisfied clients.
      </p>
    </div>

    <!-- Scrollable cards -->
    <div class="overflow-x-auto pb-4 -mx-6 px-6 scrollbar-hide">
      <div class="flex gap-4 sm:gap-6 min-w-max">
        {% for t in testimonials %}
        <div class="w-[280px] sm:w-[340px] shrink-0">
          <div class="h-full bg-background border border-primary rounded-2xl p-5 sm:p-6 hover:shadow-lg transition-all duration-300">

            <!-- Quote icon -->
            <svg xmlns="http://www.w3.org/2000/svg"
                 class="w-6 h-6 sm:w-8 sm:h-8 text-primary/20 mb-3 sm:mb-4"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/>
              <path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/>
            </svg>

            <!-- Stars -->
            <div class="flex mb-2 sm:mb-3">
              {% for i in "12345" %}
              <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 sm:w-4 sm:h-4 fill-primary text-primary"
                   viewBox="0 0 24 24">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
              </svg>
              {% endfor %}
            </div>

            <p class="text-sm sm:text-base text-muted-foreground leading-relaxed mb-4 sm:mb-6">
              "{{ t.text }}"
            </p>

            <div class="flex items-center gap-3 pt-3 sm:pt-4 border-t border-border">
              <div class="w-9 h-9 sm:w-11 sm:h-11 rounded-full bg-sky-950 flex items-center justify-center">
                <span class="text-xs sm:text-sm font-semibold text-primary">{{ t.initials }}</span>
              </div>
              <p class="font-semibold text-foreground text-sm sm:text-base">{{ t.name }}</p>
            </div>

          </div>
        </div>
        {% endfor %}
      </div>
    </div>

    <!-- Stats bar -->
    <div class="mt-10 sm:mt-12 grid grid-cols-3 gap-4 sm:gap-8 max-w-3xl mx-auto">
      <div class="text-center p-4 bg-background rounded-xl border border-border">
        <p class="text-2xl sm:text-4xl font-bold text-primary">20+</p>
        <p class="text-xs sm:text-sm text-muted-foreground mt-1">Happy Families</p>
      </div>
      <div class="text-center p-4 bg-background rounded-xl border border-border">
        <p class="text-2xl sm:text-4xl font-bold text-primary">4.6</p>
        <p class="text-xs sm:text-sm text-muted-foreground mt-1">Average Rating</p>
      </div>
      <div class="text-center p-4 bg-background rounded-xl border border-border">
        <p class="text-2xl sm:text-4xl font-bold text-primary">98%</p>
        <p class="text-xs sm:text-sm text-muted-foreground mt-1">Recommend Us</p>
      </div>
    </div>

  </div>
</section>
