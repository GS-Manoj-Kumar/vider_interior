{% load static %}
<section class="section-padding bg-card">
  <div class="section-container">

    <span class="text-sm font-medium uppercase tracking-wider text-destructive">
      Project Reels
    </span>
    <h2 class="text-2xl md:text-4xl font-bold mt-4 mb-10 text-sky-950">
      Watch Our <span class="text-sky-900">Transformations</span>
    </h2>

    <div class="overflow-x-auto -mx-6 px-6" id="reels-container">
      <div class="flex gap-4 w-max" id="reels-track">

        <!-- First set -->
        {% for reel in reels %}
        <div class="relative w-[220px] sm:w-[260px] aspect-9/16 rounded-2xl overflow-hidden shrink-0">
          <video
            src="{% static reel.video %}"
            class="w-full h-full object-cover"
            preload="none"
            muted
            loop
            playsinline
            autoplay>
          </video>
          <div class="absolute inset-0 bg-linear-to-t from-neutral-900/80 via-neutral-900/20 to-transparent"></div>
          <div class="absolute bottom-0 left-0 right-0 p-4">
            <p class="text-white text-sm font-medium">{{ reel.title }}</p>
          </div>
          <div class="absolute top-3 right-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white/80"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="20" height="20" x="2" y="2" rx="5" ry="5"/>
              <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
              <line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/>
            </svg>
          </div>
        </div>
        {% endfor %}

        <!-- Duplicate set for seamless loop -->
        {% for reel in reels %}
        <div class="relative w-[220px] sm:w-[260px] aspect-9/16 rounded-2xl overflow-hidden shrink-0">
          <video
            src="{% static reel.video %}"
            class="w-full h-full object-cover"
            preload="none"
            muted
            loop
            playsinline
            autoplay>
          </video>
          <div class="absolute inset-0 bg-linear-to-t from-neutral-900/80 via-neutral-900/20 to-transparent"></div>
          <div class="absolute bottom-0 left-0 right-0 p-4">
            <p class="text-white text-sm font-medium">{{ reel.title }}</p>
          </div>
          <div class="absolute top-3 right-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white/80"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="20" height="20" x="2" y="2" rx="5" ry="5"/>
              <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
              <line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/>
            </svg>
          </div>
        </div>
        {% endfor %}

      </div>
    </div>

  </div>
</section>
